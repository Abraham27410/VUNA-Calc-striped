name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/vuna-calculator

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
      - run: npm ci
      - run: npm test
      - run: npm run build

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject cache buster version
        run: |
          sed -i "s/VERSION/${{ github.sha }}/g" calculator/index.html

      - name: Login to Docker Hub
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      - name: Deploy via FTP with permission fix
        shell: bash
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp 2>/dev/null
          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" \
            -e "set ssl:verify-certificate no; \
                set ftp:sync-mode off; \
                set cmd:fail-exit no; \
                mirror -R --delete --verbose calculator/ public_html/calculator/; \
                chmod 644 public_html/calculator/index.html; \
                chmod 644 public_html/calculator/assets/css/bootstrap.min.css; \
                chmod 644 public_html/calculator/assets/css/calculator.css; \
                chmod 644 public_html/calculator/assets/css/styles.css; \
                chmod 644 public_html/calculator/assets/js/bootstrap.min.js; \
                chmod 644 public_html/calculator/assets/js/script.js; \
                chmod 755 public_html/calculator/; \
                chmod 755 public_html/calculator/assets/; \
                chmod 755 public_html/calculator/assets/css/; \
                chmod 755 public_html/calculator/assets/js/; \
                quit"

      - name: Verify deployment
        shell: bash
        run: |
          echo "=== Checking calculator page ==="
          HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 15 -H "Cache-Control: no-cache, no-store" "https://sangari.vudse26.cloud/calculator/" || echo "failed")
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "SUCCESS: Calculator is live!"
          else
            echo "FAIL: Got $HTTP_CODE instead of 200"
          fi
